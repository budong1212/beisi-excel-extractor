name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl tkinterdnd2 pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --name "贝思excel数据提取" `
            --collect-all tkinterdnd2 `
            main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: 贝思excel数据提取-Windows
          path: dist/*.exe
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "贝思excel数据提取 v${{ github.run_number }}"
          body: |
            ## 贝思excel数据提取
            Windows 64位可执行文件，无需安装 Python，双击即可运行。

            ### 使用说明
            1. 下载下方的 `贝思excel数据提取.exe`
            2. 双击运行
            3. 拖拽或选择 Excel 文件，设置提取参数，点击开始提取
          files: dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
